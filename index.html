<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12100e">
<title>Line Runner</title>
<style>
  :root{
    --bg:#12100e;
    --panel:#1c1916;
    --panel2:#26221d;
    --ink:#f4ede0;
    --dim:#a89a86;
    --faint:#6f6558;
    --accent:#e8a13c;
    --accent2:#c9762a;
    --good:#7fb069;
    --line:#332d26;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font:16px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;min-height:100dvh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
  header{
    padding:14px 18px calc(14px + env(safe-area-inset-top));
    padding-top:calc(14px + env(safe-area-inset-top));
    display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--bg);z-index:5;
  }
  header .brand{font-weight:700;letter-spacing:.02em;font-size:18px}
  header .brand span{color:var(--accent)}
  header .sub{font-size:12px;color:var(--faint);margin-left:auto;text-align:right;line-height:1.3}
  main{flex:1;padding:18px;max-width:760px;width:100%;margin:0 auto}
  h2{font-size:15px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin:0 0 12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:16px}
  .btn{
    background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    padding:12px 16px;font-size:15px;font-weight:600;display:inline-flex;align-items:center;
    justify-content:center;gap:8px;
  }
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);color:#1a1206;border-color:var(--accent)}
  .btn.ghost{background:transparent}
  .btn.block{width:100%}
  .btn.danger{color:#e88a7a}
  textarea{
    width:100%;background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:12px;padding:12px;font:15px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;resize:vertical;
  }
  input[type=text],select{
    width:100%;background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;font-size:15px;
  }
  label.fld{display:block;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);margin:0 0 6px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>*{flex:1}
  .muted{color:var(--dim);font-size:13px}
  .faint{color:var(--faint);font-size:12px}
  /* library */
  .scriptItem{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line)}
  .scriptItem:last-child{border-bottom:none}
  .scriptItem .t{font-weight:600}
  .scriptItem .m{font-size:12px;color:var(--faint)}
  .scriptItem .go{margin-left:auto}
  /* chunk preview */
  .chunk{padding:8px 10px;border-left:3px solid var(--line);margin:0 0 6px;background:var(--panel2);border-radius:0 8px 8px 0;font-size:14px}
  .chunk .n{color:var(--faint);font-size:11px;margin-right:8px}
  .chunk.cue{border-left-color:var(--accent2)}
  .chunk.cue .who{color:var(--accent);font-weight:700;margin-right:6px}
  .chunk.beat{margin-top:14px}
  /* rehearse */
  .levels{display:flex;gap:6px;margin:0 0 18px;overflow-x:auto;padding-bottom:4px}
  .lv{flex:0 0 auto;padding:9px 12px;border-radius:999px;border:1px solid var(--line);background:var(--panel);font-size:13px;font-weight:600;color:var(--dim);white-space:nowrap}
  .lv.on{background:var(--accent);color:#1a1206;border-color:var(--accent)}
  .stage{
    background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:26px 20px;
    min-height:230px;display:flex;flex-direction:column;justify-content:center;text-align:center;margin-bottom:16px;
  }
  .stage .cur{font-size:26px;line-height:1.4;font-weight:600}
  .stage .cur.cue{color:var(--accent)}
  .stage .cur .whoTag{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .stage .nxt{margin-top:16px;font-size:15px;color:var(--faint);line-height:1.4}
  .stage .heard{margin-top:12px;min-height:20px;font-size:15px;color:var(--good);font-style:italic;line-height:1.35}
  .stage .phase{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:14px}
  .stage .silent{color:var(--accent);font-weight:600;letter-spacing:.02em}
  .transport{display:flex;gap:12px;align-items:center;margin-bottom:12px}
  .bigplay{
    flex:1;background:var(--accent);color:#1a1206;border-radius:18px;padding:22px;font-size:20px;font-weight:800;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .bigplay.playing{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  .round{width:64px;height:64px;flex:0 0 64px;border-radius:18px;background:var(--panel2);border:1px solid var(--line);font-size:22px;display:flex;align-items:center;justify-content:center}
  .hint{width:100%;background:var(--panel2);border:1px solid var(--accent2);color:var(--accent);border-radius:16px;padding:18px;font-size:17px;font-weight:700;margin-bottom:14px}
  .hint:active{background:#2f2519}
  .ctlrow{display:flex;gap:10px;margin-bottom:8px}
  .ctlrow .btn{flex:1;padding:14px 8px;font-size:14px}
  .progress{height:6px;background:var(--panel2);border-radius:99px;overflow:hidden;margin:6px 0 14px}
  .progress i{display:block;height:100%;background:var(--accent);width:0%}
  .settings{border-top:1px solid var(--line);margin-top:8px;padding-top:14px}
  .set-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .set-row label{flex:0 0 96px;font-size:13px;color:var(--dim)}
  .set-row input[type=range]{flex:1;accent-color:var(--accent)}
  .set-row .val{flex:0 0 52px;text-align:right;font-size:13px;color:var(--faint)}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:var(--dim)}
  .toggle input{width:20px;height:20px;accent-color:var(--accent)}
  .backbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .backbar .btn{padding:8px 12px}
  .rules{font-size:12.5px;color:var(--dim);line-height:1.7}
  .rules code{background:var(--panel2);padding:1px 6px;border-radius:5px;color:var(--accent);font-size:12px}
  .pill{display:inline-block;font-size:11px;color:var(--faint);border:1px solid var(--line);border-radius:99px;padding:2px 8px;margin-left:6px}
  .empty{text-align:center;color:var(--faint);padding:30px 10px}
  .noticebar{font-size:12px;color:var(--faint);text-align:center;padding:10px 18px;border-top:1px solid var(--line)}
  .chunkedit{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
  .chunkedit .n{flex:0 0 28px;color:var(--faint);font-size:12px;padding-top:12px}
  .chunkedit textarea{flex:1;min-height:44px}
  .small{padding:8px 10px;font-size:13px}
</style>
</head>
<body>
<header>
  <div class="brand">Line <span>Runner</span></div>
  <div class="sub" id="subline">monologue trainer</div>
</header>
<main id="app"></main>
<div class="noticebar" id="notice"></div>

<script>
"use strict";

/* ---------- eoreader4 TTS hook ----------
   Browser-native speech. If your eoreader4 build exposes a speaker on
   window.eoreader4 (with .speak(text,{voice,rate,onend,onerror}) and .cancel()),
   Line Runner uses it. Otherwise it falls back to the Web Speech API,
   which is the browser-native engine eoreader4 sits on. Single swap point.  */
const TTS = (function(){
  const ext = (typeof window!=="undefined") && window.eoreader4 && typeof window.eoreader4.speak==="function" ? window.eoreader4 : null;
  let voices=[];
  function load(){ try{ voices = window.speechSynthesis.getVoices()||[]; }catch(e){ voices=[]; } }
  if(!ext && "speechSynthesis" in window){
    load();
    try{ window.speechSynthesis.onvoiceschanged = load; }catch(e){}
  }
  return {
    external: !!ext,
    listVoices(){
      if(ext && ext.listVoices) return ext.listVoices();
      if(!voices.length) load();
      return voices.filter(v=>/^en/i.test(v.lang)).concat(voices.filter(v=>!/^en/i.test(v.lang)));
    },
    speak(text,{voiceURI,rate=1,onend,onerror}={}){
      if(ext){ return ext.speak(text,{voice:voiceURI,rate,onend,onerror}); }
      try{
        const u=new SpeechSynthesisUtterance(text);
        const v=voices.find(x=>x.voiceURI===voiceURI);
        if(v)u.voice=v;
        u.rate=rate;
        u.onend=()=>onend&&onend();
        u.onerror=()=>onerror?onerror():onend&&onend();
        window.speechSynthesis.speak(u);
      }catch(e){ setTimeout(()=>onend&&onend(),400); }
    },
    cancel(){
      if(ext&&ext.cancel){ ext.cancel(); return; }
      try{ window.speechSynthesis.cancel(); }catch(e){}
    },
    ok(){ return ext || ("speechSynthesis" in window); }
  };
})();

/* ---------- persistence ----------
   Priority order: a host-provided window.storage (async KV) → browser
   localStorage → in-memory (session only). localStorage keeps saved pieces
   across reloads in a plain browser; the in-memory map is the last-resort
   fallback (e.g. private mode with storage blocked).  */
const mem={};
function lsOk(){ try{ return typeof localStorage!=="undefined" && localStorage!==null; }catch(e){ return false; } }
const Store={
  async get(k){
    try{ if(window.storage){ const r=await window.storage.get(k); return r?JSON.parse(r.value):null; } }catch(e){}
    if(lsOk()){ try{ const v=localStorage.getItem(k); if(v!=null) return JSON.parse(v); }catch(e){} }
    return mem[k]!==undefined?mem[k]:null;
  },
  async set(k,v){
    mem[k]=v;
    try{ if(window.storage){ await window.storage.set(k,JSON.stringify(v)); return; } }catch(e){}
    if(lsOk()){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  },
  async del(k){
    delete mem[k];
    try{ if(window.storage){ await window.storage.delete(k); return; } }catch(e){}
    if(lsOk()){ try{ localStorage.removeItem(k); }catch(e){} }
  }
};

/* ---------- audio blob store (IndexedDB) ----------
   Recordings are far too big for localStorage, so the audio Blob for each
   piece lives in IndexedDB keyed by the script id. Timestamps that line the
   recording up with the text are small and ride along in the script record. */
const Blobs=(function(){
  const DBN="lr-audio", STORE="audio"; let dbp=null;
  function open(){
    if(dbp) return dbp;
    dbp=new Promise((res,rej)=>{
      let req; try{ req=indexedDB.open(DBN,1); }catch(e){ rej(e); return; }
      req.onupgradeneeded=()=>{ try{ if(!req.result.objectStoreNames.contains(STORE)) req.result.createObjectStore(STORE); }catch(e){} };
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>rej(req.error);
    });
    return dbp;
  }
  function store(mode){ return open().then(db=>db.transaction(STORE,mode).objectStore(STORE)); }
  return {
    ok(){ try{ return typeof indexedDB!=="undefined" && !!indexedDB; }catch(e){ return false; } },
    async put(id,blob){ const st=await store("readwrite"); return new Promise((res,rej)=>{ const r=st.put(blob,id); r.onsuccess=()=>res(true); r.onerror=()=>rej(r.error); }); },
    async get(id){ try{ const st=await store("readonly"); return await new Promise(res=>{ const r=st.get(id); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); }catch(e){ return null; } },
    async del(id){ try{ const st=await store("readwrite"); return await new Promise(res=>{ const r=st.delete(id); r.onsuccess=()=>res(true); r.onerror=()=>res(false); }); }catch(e){ return false; } }
  };
})();

/* ---------- in-app recorder (optional) ----------
   Lets the user record straight into the piece. Feature-detected; the button
   is hidden where MediaRecorder / getUserMedia are unavailable. */
const Recorder={
  mr:null, parts:[], stream:null,
  supported(){ return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder); },
  async start(){
    this.stream=await navigator.mediaDevices.getUserMedia({audio:true});
    this.parts=[];
    const opts={};
    try{
      const mt=["audio/webm","audio/mp4","audio/ogg"].find(t=>window.MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(t));
      if(mt) opts.mimeType=mt;
    }catch(e){}
    this.mr=new MediaRecorder(this.stream,opts);
    this.mr.ondataavailable=e=>{ if(e.data&&e.data.size) this.parts.push(e.data); };
    this.mr.start();
  },
  stop(){
    return new Promise(res=>{
      if(!this.mr){ res(null); return; }
      const type=this.mr.mimeType||"audio/webm";
      this.mr.onstop=()=>{
        const blob=new Blob(this.parts,{type});
        try{ this.stream.getTracks().forEach(t=>t.stop()); }catch(e){}
        this.mr=null; this.stream=null; this.parts=[];
        res(blob);
      };
      try{ this.mr.stop(); }catch(e){ res(null); }
    });
  }
};

/* ---------- recorded-audio player ----------
   Plays a bounded segment [start,end) of the attached recording, and drives
   free playback for the alignment screen. Kept at natural speed (pace only
   affects the silent gaps, same as the TTS path).  */
const Rec={
  el:null, url:null, endTimer:null, onend:null,
  ensure(){ if(!this.el){ try{ this.el=new Audio(); this.el.preload="auto"; }catch(e){ this.el=null; } } return this.el; },
  load(url){
    this.cancel();
    if(this.url && this.url!==url){ try{ URL.revokeObjectURL(this.url); }catch(e){} }
    this.url=url;
    const el=this.ensure(); if(el&&url){ el.src=url; try{ el.load(); }catch(e){} }
  },
  unload(){
    this.cancel();
    if(this.url){ try{ URL.revokeObjectURL(this.url); }catch(e){} this.url=null; }
    if(this.el){ try{ this.el.removeAttribute("src"); this.el.load(); }catch(e){} }
  },
  ready(){ return !!(this.el && this.url); },
  duration(){ return this.el && isFinite(this.el.duration) ? this.el.duration : 0; },
  clearTimer(){ if(this.endTimer){ clearTimeout(this.endTimer); this.endTimer=null; } },
  playSegment(start,end,{onend}={}){
    const el=this.ensure();
    if(!el||!this.url){ if(onend)onend(); return; }
    this.cancel(); this.onend=onend||null;
    const s2=Math.max(0,start||0), dur=Math.max(0.05,(end-s2));
    const finish=()=>{ this.clearTimer(); el.removeEventListener("timeupdate",onTime); try{el.pause();}catch(e){} const cb=this.onend; this.onend=null; if(cb)cb(); };
    const onTime=()=>{ if(el.currentTime>=end-0.03) finish(); };
    const begin=()=>{
      try{
        el.playbackRate=1; el.currentTime=s2;
        el.addEventListener("timeupdate",onTime);
        this.endTimer=setTimeout(finish, Math.ceil(dur*1000)+140);
        const p=el.play(); if(p&&p.catch)p.catch(()=>finish());
      }catch(e){ finish(); }
    };
    if(el.readyState>=1) begin();
    else { const onMeta=()=>{ el.removeEventListener("loadedmetadata",onMeta); begin(); }; el.addEventListener("loadedmetadata",onMeta); try{ el.load(); }catch(e){} }
  },
  /* free playback controls used by the alignment screen */
  play(){ const el=this.ensure(); if(el&&this.url){ this.clearTimer(); try{ el.playbackRate=1; const p=el.play(); if(p&&p.catch)p.catch(()=>{}); }catch(e){} } },
  pauseEl(){ if(this.el){ try{ this.el.pause(); }catch(e){} } },
  seek(t){ if(this.el){ try{ this.el.currentTime=Math.max(0,t||0); }catch(e){} } },
  time(){ return this.el ? (this.el.currentTime||0) : 0; },
  playing(){ return !!(this.el && !this.el.paused && !this.el.ended); },
  cancel(){ this.clearTimer(); this.onend=null; if(this.el){ try{ this.el.pause(); }catch(e){} } }
};
/* ---------- speech listener (Web Speech recognition) ----------
   During the user's turn it transcribes what they say and matches it against
   the expected line, so rehearsal advances when they actually nail the line
   instead of just waiting out a timer. Feature-detected; degrades to the old
   timed pause where recognition isn't available. */
const Ear=(function(){
  const SR = (typeof window!=="undefined") && (window.SpeechRecognition || window.webkitSpeechRecognition);
  let rec=null, on=false;
  function collect(e){ let t=""; for(let i=0;i<e.results.length;i++){ t+=e.results[i][0].transcript+" "; } return t.trim(); }
  return {
    supported(){ return !!SR; },
    start({onresult,onend}={}){
      if(!SR) return false;
      try{
        rec=new SR();
        rec.lang="en-US"; rec.continuous=true; rec.interimResults=true; rec.maxAlternatives=1;
        rec.onresult=e=>{ if(onresult) onresult(collect(e)); };
        rec.onerror=()=>{};
        rec.onend=()=>{ on=false; if(onend) onend(); };
        rec.start(); on=true; return true;
      }catch(e){ on=false; return false; }
    },
    stop(){ if(rec){ try{ rec.stop(); }catch(e){} } on=false; },
    abort(){ if(rec){ try{ rec.abort(); }catch(e){} rec=null; } on=false; }
  };
})();
/* Fraction of the expected words matched, in order (longest common subsequence
   over words) — tolerant of stumbles and filler, strict about order. */
function normWords(t){ return (t||"").toLowerCase().replace(/[^a-z0-9'\s]/g," ").replace(/\s+/g," ").trim().split(" ").filter(Boolean); }
function seqMatch(expected,heard){
  const E=normWords(expected), H=normWords(heard);
  if(!E.length||!H.length) return 0;
  const n=H.length; let dp=new Array(n+1).fill(0);
  for(let i=1;i<=E.length;i++){ let prev=0; for(let j=1;j<=n;j++){ const tmp=dp[j]; dp[j]= E[i-1]===H[j-1] ? prev+1 : Math.max(dp[j],dp[j-1]); prev=tmp; } }
  return dp[n]/E.length;
}
function matchThreshold(expected){ return normWords(expected).length<=3 ? 0.95 : 0.6; }

function silence(){ try{ TTS.cancel(); }catch(e){} try{ Rec.cancel(); }catch(e){} try{ Ear.abort(); }catch(e){} }

/* ---------- helpers ---------- */
const uid=()=>Math.random().toString(36).slice(2,9);
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function splitSentences(text){
  const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const avg=lines.reduce((a,l)=>a+l.length,0)/Math.max(1,lines.length);
  if(lines.length>1 && avg<58) return lines;               // verse / hard line breaks
  const joined=lines.join(" ");
  const parts=joined.match(/[^.!?;]+[.!?;]+["')\]]?|\S[^.!?;]*$/g);
  return parts?parts.map(p=>p.trim()).filter(Boolean):[joined];
}
function parseChunks(raw){
  const out=[];
  const blocks=raw.replace(/\r/g,"").split(/\n\s*\n/);
  blocks.forEach(block=>{
    const t=block.trim(); if(!t) return;
    const sentences=splitSentences(t);
    sentences.forEach((s,i)=>{
      const c={id:uid(),text:s.trim(),cue:false,speaker:null,beat:i===0};
      const m=c.text.match(/^([A-Z][A-Z0-9 .'’\-]{1,24}):\s*(.+)$/);
      if(m){ c.speaker=m[1].trim(); c.text=m[2].trim(); c.cue=true; }
      if(c.text) out.push(c);
    });
  });
  return out;
}
function words(t){return t.trim().split(/\s+/).filter(Boolean);}
function leadIn(t){const w=words(t);return w.length<=4?t:w.slice(0,3).join(" ")+" …";}
function durMs(t,pace){const n=words(t).length;return Math.max(1500,(n*380+700))*pace;}
function fmt(sec){ sec=Math.max(0,Math.round(sec||0)); const m=Math.floor(sec/60),s=sec%60; return m+":"+(s<10?"0":"")+s; }

/* ---------- recording <-> text alignment ---------- */
function marksCount(s){ if(!s||!Array.isArray(s.marks))return 0; let n=0; for(let i=0;i<s.chunks.length;i++){ if(s.marks[i]!=null)n++; } return n; }
function fitMarks(s){                                   // keep marks[] the same length as chunks[]
  const n=s.chunks.length;
  if(!Array.isArray(s.marks)){ s.marks=new Array(n).fill(null); return; }
  if(s.marks.length!==n){ const m=new Array(n).fill(null); for(let i=0;i<Math.min(n,s.marks.length);i++)m[i]=s.marks[i]; s.marks=m; }
}
function audioSeg(ci){                                  // {start,end} of chunk ci in the recording, or null
  const s=S.cur; if(!s||!Rec.ready()||!Array.isArray(s.marks)) return null;
  const start=s.marks[ci]; if(start==null) return null;
  let end=null;
  for(let j=ci+1;j<s.marks.length;j++){ if(s.marks[j]!=null){ end=s.marks[j]; break; } }
  if(end==null){ const d=s.audioDur||Rec.duration(); end=d>start?d:start+3; }
  return end>start ? {start,end} : null;
}
function leadPortion(seg){ return Math.min(1.6, Math.max(0.6,(seg.end-seg.start)*0.45)); }
function speakStep(st, done){                           // recording if the line is aligned, else robot voice
  const seg=audioSeg(st.ci);
  if(seg){
    if(st.tag==="lead") Rec.playSegment(seg.start, seg.start+leadPortion(seg), {onend:done});
    else Rec.playSegment(seg.start, seg.end, {onend:done});
  }else{
    TTS.speak(st.text,{voiceURI:st.voice,rate:1,onend:done});
  }
}
async function loadAudioFor(s){
  Rec.unload();
  if(s && s.audioName && Blobs.ok()){
    const b=await Blobs.get(s.id);
    if(b){ try{ Rec.load(URL.createObjectURL(b)); return true; }catch(e){} }
  }
  return false;
}
function recSourceLabel(){
  const s=S.cur; if(!s) return "";
  if(!s.audioName) return "🔊 Robot voice";
  const need=s.chunks.length, have=marksCount(s);
  if(Rec.ready() && have>0) return have>=need ? "🎙 Your recording" : "🎙 Your recording · "+(need-have)+" line"+(need-have===1?"":"s")+" on robot voice";
  return "🎙 Recording attached — align lines in Edit";
}

/* ---------- app state ---------- */
const S={
  view:"library",
  index:[],            // [{id,title,chunks,updated}]
  cur:null,            // active script object
  draft:"",            // raw text while editing
  settings:{ level:2, pace:1, loop:true, youVoice:"", cueVoice:"", rangeStart:0, rangeEnd:-1, listen:true }
};

async function boot(){
  const idx=await Store.get("lr:index"); S.index=idx||[];
  const st=await Store.get("lr:settings"); if(st) S.settings=Object.assign(S.settings,st);
  render();
  updateNotice();
}
function updateNotice(){
  const n=document.getElementById("notice");
  if(!TTS.ok()){ n.textContent="This browser has no speech engine. Open in Safari or Chrome."; return; }
  const isiOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  n.innerHTML = TTS.external
    ? "Using eoreader4 TTS."
    : (isiOS
        ? "Tip: on iPhone, keep the screen awake while driving. iOS pauses speech when the screen locks."
        : "Browser voices vary by device. Pick a clear voice in Edit.");
}
async function saveIndex(){ await Store.set("lr:index",S.index); }
async function saveSettings(){ await Store.set("lr:settings",S.settings); }
async function saveScript(s){
  s.updated=Date.now();
  await Store.set("lr:script:"+s.id,s);
  const row={id:s.id,title:s.title,updated:s.updated,count:s.chunks.length,audio:!!s.audioName};
  const i=S.index.findIndex(x=>x.id===s.id);
  if(i>=0)S.index[i]=row; else S.index.unshift(row);
  await saveIndex();
}
async function loadScript(id){ return await Store.get("lr:script:"+id); }
async function delScript(id){
  await Store.del("lr:script:"+id);
  try{ if(Blobs.ok()) await Blobs.del(id); }catch(e){}
  S.index=S.index.filter(x=>x.id!==id); await saveIndex();
}

/* Read a saved recording's length without keeping the element around. */
function probeDuration(blob){
  return new Promise(res=>{
    try{
      const u=URL.createObjectURL(blob), a=new Audio();
      a.preload="metadata";
      a.onloadedmetadata=()=>{ const d=isFinite(a.duration)?a.duration:0; try{URL.revokeObjectURL(u);}catch(e){} res(d); };
      a.onerror=()=>{ try{URL.revokeObjectURL(u);}catch(e){} res(0); };
      a.src=u;
    }catch(e){ res(0); }
  });
}
/* Persist the current editor contents (title + text), keeping any audio, and
   return the saved script. Used by Save and by the audio actions, which need a
   stored id before a recording can be attached. */
async function persistEditor(){
  const title=($("title").value||"Untitled monologue").trim();
  const chunks=parseChunks($("raw").value);
  if(!chunks.length) return null;
  if(!S.settings.youVoice){const v=TTS.listVoices();if(v[0])S.settings.youVoice=v[0].voiceURI;if(v[1])S.settings.cueVoice=v[1].voiceURI;else if(v[0])S.settings.cueVoice=v[0].voiceURI;}
  await saveSettings();
  const s=S.cur||{id:uid()};
  s.title=title; s.chunks=chunks; s.rawText=$("raw").value;
  if(s.audioName) fitMarks(s);
  await saveScript(s);
  S.cur=s; return s;
}
/* Store a picked/recorded audio blob against the current piece. */
async function attachAudio(blob,name){
  if(!Blobs.ok()){ alert("This browser can’t store audio."); return; }
  if(!blob||!blob.size){ alert("That recording was empty."); return; }
  const mb=blob.size/1048576;
  if(mb>40 && !confirm("That file is "+mb.toFixed(0)+" MB and may be too large to save. Continue?")) return;
  const s=await persistEditor();
  if(!s){ alert("Add the script text first, then attach a recording."); return; }
  try{ await Blobs.put(s.id,blob); }
  catch(e){ alert("Couldn’t save the recording — it may be too large for this browser’s storage."); return; }
  s.audioName=name||"recording";
  s.audioDur=await probeDuration(blob);
  s.marks=new Array(s.chunks.length).fill(null);
  await saveScript(s);
  render();
}

/* =========================================================
   WIRING
========================================================= */
function wire(){
  if(S.view==="library") wireLibrary();
  else if(S.view==="edit") wireEdit();
  else if(S.view==="align") wireAlign();
  else wireRehearse();
}
function $(id){return document.getElementById(id);}
function on(id,ev,fn){const e=$(id);if(e)e.addEventListener(ev,fn);}

function wireLibrary(){
  Rec.unload();
  on("new","click",()=>{ S.cur=null; S.draft=""; S.view="edit"; render(); });
  document.querySelectorAll("[data-open]").forEach(b=>b.addEventListener("click",async e=>{
    const id=e.currentTarget.getAttribute("data-open");
    const s=await loadScript(id);
    if(s){ S.cur=s; if(!Array.isArray(s.marks))s.marks=[]; S.settings.rangeStart=0; S.settings.rangeEnd=-1; await loadAudioFor(s); S.view="rehearse"; render(); }
  }));
}

function wireEdit(){
  on("back","click",()=>{ S.view = S.cur?"rehearse":"library"; render(); });
  const raw=$("raw");
  raw.addEventListener("input",()=>{
    S.draft=raw.value;
    const chunks=parseChunks(S.draft);
    const p=$("preview");
    p.innerHTML = chunks.length ? chunks.map((c,i)=>`
      <div class="chunk ${c.cue?"cue":""} ${c.beat&&i>0?"beat":""}">
        <span class="n">${i+1}</span>${c.cue?`<span class="who">${esc(c.speaker)}</span>`:""}${esc(c.text)}
      </div>`).join("") : `<div class="faint">Paste text above to see the chunks.</div>`;
    document.querySelectorAll(".card h2 .pill").forEach(el=>{if(el.parentElement.textContent.includes("Chunks"))el.textContent=chunks.length;});
  });
  on("youVoice","change",e=>{S.settings.youVoice=e.target.value;saveSettings();});
  on("cueVoice","change",e=>{S.settings.cueVoice=e.target.value;saveSettings();});
  on("testYou","click",()=>{TTS.cancel();TTS.speak("This is how your lines will sound when the app reads them back.",{voiceURI:$("youVoice").value,rate:1});});
  on("testCue","click",()=>{TTS.cancel();TTS.speak("And this voice reads the other characters.",{voiceURI:$("cueVoice").value,rate:1});});

  /* ---- recording controls ---- */
  let recActive=false;
  on("btnUpload","click",()=>{ const f=$("audioFile"); if(f)f.click(); });
  on("btnReplace","click",()=>{ const f=$("audioFile"); if(f)f.click(); });
  on("audioFile","change",async e=>{
    const f=e.target.files&&e.target.files[0]; e.target.value="";
    if(f) await attachAudio(f, f.name);
  });
  const recBtn=$("btnRecord");
  if(recBtn){
    recBtn.addEventListener("click",async()=>{
      if(!recActive){
        try{ await Recorder.start(); recActive=true; recBtn.textContent="⏹ Stop recording"; recBtn.classList.add("primary"); }
        catch(err){ alert("Couldn’t access the microphone."); }
      }else{
        recActive=false; recBtn.textContent="● Record"; recBtn.classList.remove("primary");
        const blob=await Recorder.stop();
        if(blob) await attachAudio(blob,"My recording");
      }
    });
  }
  on("btnRemoveAudio","click",async()=>{
    if(!S.cur)return;
    if(!confirm("Remove the recording? Your text stays."))return;
    await Blobs.del(S.cur.id);
    delete S.cur.audioName; delete S.cur.audioDur; S.cur.marks=new Array(S.cur.chunks.length).fill(null);
    Rec.unload();
    await saveScript(S.cur); render();
  });
  on("btnAlign","click",async()=>{
    const s=await persistEditor(); if(!s)return;
    await loadAudioFor(s);
    if(!Rec.ready()){ alert("Couldn’t load the recording to align it."); return; }
    const total=s.chunks.length;
    Align.marks=(Array.isArray(s.marks)&&s.marks.length===total)?s.marks.slice():new Array(total).fill(null);
    Align.marks[0]=0;
    Align.idx=1; while(Align.idx<total && Align.marks[Align.idx]!=null) Align.idx++;
    Rec.cancel(); Rec.seek(0);
    S.view="align"; render();
  });

  on("save","click",async()=>{
    const s=await persistEditor();
    if(!s){ alert("Nothing to save yet. Paste your monologue first."); return; }
    await loadAudioFor(s);
    S.settings.rangeStart=0; S.settings.rangeEnd=-1;
    S.view="rehearse"; render();
  });
  on("delete","click",async()=>{
    if(S.cur && confirm("Delete this piece?")){ await delScript(S.cur.id); S.cur=null; Rec.unload(); S.view="library"; render(); }
  });
}

/* ---------- rehearsal engine ---------- */
function coachOn(){ return !!(S.settings.listen && Ear.supported()); }
/* Speak one chunk's line — the recording if it's aligned, else the robot voice. */
function speakLine(ci,done){
  const seg=audioSeg(ci);
  if(seg){ Rec.playSegment(seg.start,seg.end,{onend:done}); return; }
  const c=S.cur.chunks[ci];
  TTS.speak(c.text,{voiceURI:c.cue?(S.settings.cueVoice||S.settings.youVoice):S.settings.youVoice,rate:1,onend:done});
}
const Engine={
  steps:[], chunkStart:[], pos:0, running:false, timer:null, poll:null, wake:null,
  curChunk:0, got:{},

  build(){
    const s=S.cur, set=S.settings, pace=set.pace;
    const a=set.rangeStart||0, b=(set.rangeEnd<0?s.chunks.length-1:set.rangeEnd);
    const you=set.youVoice, cue=set.cueVoice||set.youVoice;
    const gap=Math.round(320*pace);
    const coach=coachOn();
    this.steps=[]; this.chunkStart=[]; this.got={};
    for(let ci=a; ci<=b && ci<s.chunks.length; ci++){
      const c=s.chunks[ci];
      this.chunkStart[ci]=this.steps.length;
      const push=(o)=>this.steps.push(Object.assign({ci},o));
      if(c.cue){
        push({type:"speak",text:c.text,voice:cue,tag:"cue",who:c.speaker});
      }else if(coach){
        /* Duolingo-style: give the line first (assume it isn't known), then
           wait — mic open — until it's actually said back. */
        push({type:"speak",text:c.text,voice:you,tag:"read"});
        push({type:"listen",tag:"you"});
      }else{
        switch(set.level){
          case 1: push({type:"speak",text:c.text,voice:you,tag:"read"}); break;
          case 2: push({type:"speak",text:c.text,voice:you,tag:"read"});
                  push({type:"pause",ms:durMs(c.text,pace),tag:"echo"}); break;
          case 3: push({type:"speak",text:leadIn(c.text),voice:you,tag:"lead"});
                  push({type:"pause",ms:durMs(c.text,pace),tag:"you"});
                  push({type:"speak",text:c.text,voice:you,tag:"confirm"}); break;
          case 4: push({type:"pause",ms:durMs(c.text,pace),tag:"you"});
                  push({type:"speak",text:c.text,voice:you,tag:"confirm"}); break;
          case 5: push({type:"pause",ms:durMs(c.text,pace),tag:"silent"}); break;
        }
      }
      push({type:"pause",ms:gap,tag:"gap"});
    }
    this.rangeA=a; this.rangeB=b;
  },

  async play(){
    if(!this.steps.length) this.build();
    this.running=true; setPlayUI(true); this.acquireWake();
    this.run();
  },
  run(){
    if(!this.running) return;
    if(this.pos>=this.steps.length){ this.end(); return; }
    const st=this.steps[this.pos];
    this.curChunk=st.ci;
    paint(st);
    const self=this;
    const done=()=>{ if(!self.running)return; self.pos++; self.run(); };
    if(st.type==="speak"){ speakStep(st, done); }
    else if(st.type==="listen"){ this.listenStep(st.ci, done); }
    else{ this.timer=setTimeout(done, st.ms); }
  },

  /* Interactive turn: mic open, aware of whether you're speaking, advancing
     only once you've actually said the line. Never times out to the next line
     on its own — if you go quiet without getting it, it hands the line back. */
  listenStep(ci, done){
    const self=this;
    const c=S.cur.chunks[ci], expected=c.text, thr=matchThreshold(expected);
    let committed="", curT="", heard="", started=false, lastGrow=Date.now(), finished=false, phase="listen";
    const H=()=>$("heard");
    const setHeard=()=>{ heard=(committed+" "+curT).trim(); const h=H(); if(h) h.textContent = heard ? "“"+heard.split(/\s+/).slice(-9).join(" ")+"”" : ""; };
    const prompt=()=>{ const p=$("phase"),cu=$("cur"); if(p)p.textContent="🎧 Your turn — say it"; if(cu)cu.innerHTML=`<span class="silent">• say your line •</span>`; const h=H(); if(h)h.textContent=""; };
    const succeed=()=>{
      if(finished)return; finished=true; self.clearListen();
      self.got[ci]=true;
      const p=$("phase"),cu=$("cur"),h=H();
      if(p)p.textContent="✓ Nice"; if(cu)cu.innerHTML=`<span class="silent" style="color:var(--good)">✓ got it</span>`; if(h)h.textContent="";
      updateCounter();
      self.timer=setTimeout(()=>{ if(self.running) done(); }, 600);
    };
    const arm=()=>{
      Ear.start({
        onresult:(t)=>{
          if(finished)return;
          curT=t||""; if(curT){ started=true; lastGrow=Date.now(); }
          setHeard();
          if(seqMatch(expected,heard)>=thr) succeed();
        },
        onend:()=>{ if(finished||!self.running)return; committed=(committed+" "+curT).trim(); curT=""; if(phase==="listen") arm(); }
      });
    };
    const represent=()=>{                          // hand the line back, then listen fresh
      if(finished||!self.running)return;
      phase="give"; Ear.stop();
      committed=""; curT=""; heard=""; started=false;
      const p=$("phase"),cu=$("cur"); if(p)p.textContent="Here it is — say it after me";
      if(cu){ if(c.cue) cu.innerHTML=`<span class="whoTag">${esc(c.speaker||"cue")}</span>${esc(c.text)}`; else cu.textContent=c.text; }
      speakLine(ci, ()=>{ if(finished||!self.running)return; phase="listen"; lastGrow=Date.now(); prompt(); arm(); });
    };
    // begin: mic open, watch speech activity
    phase="listen"; prompt(); arm();
    this.poll=setInterval(()=>{
      if(finished||!self.running){ self.clearListen(); return; }
      if(phase!=="listen") return;                 // don't nudge while re-giving the line
      const idle=Date.now()-lastGrow;
      if(!started){ if(idle>9000) represent(); }    // stuck, never started → give it again
      else if(idle>1900) represent();               // finished an attempt that wasn't right → give it again
    }, 350);
  },
  clearListen(){ if(this.poll){ clearInterval(this.poll); this.poll=null; } try{ Ear.abort(); }catch(e){} },

  pause(){
    this.running=false; setPlayUI(false);
    silence(); this.clearListen(); clearTimeout(this.timer); this.releaseWake();
  },
  toggle(){ this.running?this.pause():this.play(); },
  stopHard(){ this.running=false; silence(); this.clearListen(); clearTimeout(this.timer); this.releaseWake(); },

  gotoChunk(ci){
    ci=Math.max(this.rangeA??0, Math.min(ci, this.rangeB??(S.cur.chunks.length-1)));
    const wasPlaying=this.running;
    this.stopHard();
    if(this.chunkStart[ci]==null) this.build();
    this.pos=this.chunkStart[ci]||0;
    this.curChunk=ci;
    paint(this.steps[this.pos]);
    if(wasPlaying){ this.running=true; setPlayUI(true); this.acquireWake(); this.run(); }
    else setPlayUI(false);
  },
  repeat(){ this.gotoChunk(this.curChunk); if(!this.running){this.play();} },
  next(){ this.gotoChunk(this.curChunk+1); },
  prev(){ this.gotoChunk(this.curChunk-1); },
  restart(){ this.gotoChunk(this.rangeA??0); },

  hint(){
    const c=S.cur.chunks[this.curChunk]; if(!c)return;
    const wasPlaying=this.running;
    this.running=false; silence(); this.clearListen(); clearTimeout(this.timer);
    const phase=$("phase"); if(phase)phase.textContent="Hint";
    const resume=()=>{ if(wasPlaying){ this.running=true; this.run(); } };
    if(coachOn()){ speakLine(this.curChunk, resume); return; }   // coach: replay the whole line
    const seg=audioSeg(this.curChunk);
    if(seg) Rec.playSegment(seg.start, seg.start+leadPortion(seg), {onend:resume});
    else TTS.speak(leadIn(c.text),{voiceURI:S.settings.youVoice,rate:1,onend:resume});
  },

  end(){
    if(S.settings.loop){ this.pos=this.chunkStart[this.rangeA??0]||0; this.run(); return; }
    this.running=false; setPlayUI(false); this.clearListen(); this.releaseWake();
    const phase=$("phase"), cur=$("cur"), nxt=$("nxt");
    if(phase)phase.textContent="Done"; if(cur)cur.textContent="End of range."; if(nxt)nxt.textContent="";
  },
  rebuild(){ const keep=this.curChunk; this.stopHard(); this.steps=[]; this.build(); this.pos=this.chunkStart[Math.min(keep,this.rangeB)]||0; setPlayUI(false); paint(this.steps[this.pos]); },

  async acquireWake(){ try{ if("wakeLock" in navigator){ this.wake=await navigator.wakeLock.request("screen"); } }catch(e){} },
  releaseWake(){ try{ if(this.wake){ this.wake.release(); this.wake=null; } }catch(e){} }
};

const PHASE={read:"Your line — listen",lead:"Lead-in",you:"Your turn",confirm:"Confirm",echo:"Say it back",silent:"Off book",cue:"Cue",gap:""};
function updateCounter(){
  const counter=$("counter"); if(!counter)return;
  const s=S.cur; if(!s)return;
  const ci=Engine.curChunk, total=s.chunks.length;
  let got=0; for(const k in Engine.got){ if(Engine.got[k]) got++; }
  counter.textContent = `Chunk ${ci+1} / ${total}` + (got?` · ✓ ${got}`:"");
}
function paint(st){
  if(!st)return;
  const s=S.cur, ci=st.ci;
  const c=s.chunks[ci], nc=s.chunks[ci+1];
  const phase=$("phase"), cur=$("cur"), nxt=$("nxt"), bar=$("bar"), hd=$("heard");
  if(st.tag==="gap") return;
  if(hd && st.tag!=="you") hd.textContent="";
  if(phase) phase.textContent=PHASE[st.tag]||"";
  if(cur){
    cur.classList.toggle("cue", !!c.cue);
    if(st.tag==="you"||st.tag==="silent"||st.tag==="echo"){
      cur.innerHTML=`<span class="silent">• your line •</span>`;
    }else if(c.cue){
      cur.innerHTML=`<span class="whoTag">${esc(c.speaker||"cue")}</span>${esc(c.text)}`;
    }else if(st.tag==="lead"){
      cur.innerHTML=esc(leadIn(c.text));
    }else{
      cur.textContent=c.text;
    }
  }
  if(nxt){ nxt.textContent = nc ? "next: "+ (nc.cue?("["+nc.speaker+"] "):"") + (nc.text.length>90?nc.text.slice(0,90)+"…":nc.text) : ""; }
  if(bar){ const span=(Engine.rangeB-Engine.rangeA)||1; bar.style.width=Math.round(((ci-Engine.rangeA)/span)*100)+"%"; }
  updateCounter();
}
function setPlayUI(on){
  const p=$("play"); if(!p)return;
  p.classList.toggle("playing",on);
  p.innerHTML = on ? "⏸ Pause" : "▶ Play";
}

function wireRehearse(){
  Engine.stopHard(); Engine.steps=[]; Engine.pos=0; Engine.curChunk=S.settings.rangeStart||0;
  const set=S.settings, total=S.cur.chunks.length;
  const rsV=$("rsV"), reV=$("reV");
  if(rsV)rsV.textContent=(set.rangeStart||0)+1;
  if(reV)reV.textContent=(set.rangeEnd<0?total:set.rangeEnd+1);

  // load the recording (if any) so coaching/playback can use it
  if(S.cur.audioName && Blobs.ok() && !Rec.ready()){
    loadAudioFor(S.cur).then(()=>{ const sl=$("srcline"); if(sl) sl.textContent=recSourceLabel(); });
  }
  document.querySelectorAll("[data-lv]").forEach(b=>b.addEventListener("click",e=>{
    set.level=+e.currentTarget.getAttribute("data-lv"); saveSettings();
    document.querySelectorAll("[data-lv]").forEach(x=>x.classList.remove("on"));
    e.currentTarget.classList.add("on");
    Engine.rebuild();
  }));
  on("coach","change",e=>{ set.listen=e.target.checked; saveSettings(); render(); });
  on("play","click",()=>Engine.toggle());
  on("hintBtn","click",()=>Engine.hint());
  on("repeat","click",()=>Engine.repeat());
  on("restart","click",()=>Engine.restart());
  on("back1","click",()=>Engine.prev());
  on("fwd1","click",()=>Engine.next());
  on("back","click",()=>{ Engine.stopHard(); S.view="library"; render(); });
  on("edit","click",()=>{ Engine.stopHard(); S.draft=S.cur.rawText||S.cur.chunks.map(c=>(c.cue?c.speaker+": ":"")+c.text).join("\n"); S.view="edit"; render(); });

  on("pace","input",e=>{ set.pace=+e.target.value; $("paceV").textContent=set.pace.toFixed(1)+"×"; });
  on("pace","change",()=>{ saveSettings(); Engine.rebuild(); });
  on("rs","input",e=>{ let v=+e.target.value-1; if(v>(set.rangeEnd<0?total-1:set.rangeEnd))v=(set.rangeEnd<0?total-1:set.rangeEnd); set.rangeStart=v; $("rsV").textContent=v+1; e.target.value=v+1; });
  on("rs","change",()=>{ saveSettings(); Engine.rebuild(); });
  on("re","input",e=>{ let v=+e.target.value-1; if(v<set.rangeStart)v=set.rangeStart; set.rangeEnd=v; $("reV").textContent=v+1; e.target.value=v+1; });
  on("re","change",()=>{ saveSettings(); Engine.rebuild(); });
  on("loop","change",e=>{ set.loop=e.target.checked; saveSettings(); });

  Engine.build(); paint(Engine.steps[0]);
}

/* ---------- alignment screen (tap the recording to the text) ---------- */
const Align={ marks:[], idx:1, raf:null };
function alignTick(){
  const t=Rec.time(), d=(S.cur&&S.cur.audioDur)||Rec.duration()||0;
  const at=$("atime"); if(at) at.textContent=fmt(t)+" / "+fmt(d);
  const sk=$("aseek"); if(sk && !sk._drag) sk.value = d ? Math.round(t/d*1000) : 0;
  Align.raf = Rec.playing() ? requestAnimationFrame(alignTick) : null;
}
function stopAlignTick(){ if(Align.raf){ cancelAnimationFrame(Align.raf); Align.raf=null; } }
function wireAlign(){
  const s=S.cur, total=s.chunks.length;
  const setBtn=()=>{ const b=$("aplay"); if(b) b.innerHTML=Rec.playing()?"⏸ Pause":"▶ Play"; };
  setBtn();
  if(Rec.playing() && !Align.raf) Align.raf=requestAnimationFrame(alignTick);
  on("aplay","click",()=>{
    if(Rec.playing()){ Rec.pauseEl(); }
    else{ Rec.play(); if(!Align.raf) Align.raf=requestAnimationFrame(alignTick); }
    setBtn();
  });
  on("amark","click",()=>{
    if(Align.idx<total){ Align.marks[Align.idx]=Rec.time(); Align.idx++; render(); }
  });
  on("aundo","click",()=>{ if(Align.idx>1){ Align.idx--; Align.marks[Align.idx]=null; render(); } });
  on("arestart","click",()=>{ Rec.seek(0); });
  on("aclear","click",()=>{ Align.marks=new Array(total).fill(null); Align.marks[0]=0; Align.idx=1; render(); });
  on("aseek","input",e=>{ const d=(s.audioDur||Rec.duration()||0); e.target._drag=true; Rec.seek(d*(+e.target.value/1000)); const at=$("atime"); if(at)at.textContent=fmt(Rec.time())+" / "+fmt(d); });
  on("aseek","change",e=>{ e.target._drag=false; });
  on("adone","click",async()=>{ stopAlignTick(); Rec.pauseEl(); s.marks=Align.marks.slice(); await saveScript(s); S.view="edit"; render(); });
  on("aback","click",()=>{ stopAlignTick(); Rec.pauseEl(); S.view="edit"; render(); });
}

document.addEventListener("visibilitychange",()=>{ if(document.hidden && Engine.running){ /* keep running; iOS may pause speech */ } });
boot();
</script>
